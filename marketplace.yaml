name: fantasy-football-toolkit
owner:
  name: Fantasy Lab
  namespace: dev.fantasylab
  email: team@fantasylab.dev
description: Fantasy football agent tooling for every harness. Install the provider-agnostic skills, then add the data provider you use.
plugins:
