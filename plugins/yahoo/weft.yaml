description: Yahoo Fantasy data provider (MCP), covering Yahoo's fantasy sports (NFL, NHL, NBA, MLB) with read and write access (leagues, rosters, matchups, free agents, set-lineup, add/drop, trades). Needs a one-time Yahoo OAuth login. Install alongside fantasy-manager to give the skills live data, the same way the sleeper provider does.
